<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin - Product Shop</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav id="nav"></nav>

  <main>
    <h1>Admin Panel</h1>

    <div id="alert"></div>

    <div class="section">
      <h2>Users</h2>
      <table id="users-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Name</th>
            <th>Superuser</th>
            <th>Created At</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-body"></tbody>
      </table>
    </div>

    <div class="section">
      <h2>Products</h2>
      <table id="products-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Price</th>
            <th>Owner ID</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="products-body"></tbody>
      </table>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
