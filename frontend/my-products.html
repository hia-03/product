<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Products - Product Shop</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav id="nav"></nav>

  <main>
    <h1>My Products</h1>

    <div id="alert"></div>

    <div class="section">
      <h2 id="form-title">Add Product</h2>
      <form id="product-form">
        <input type="hidden" id="product-id" />
        <div>
          <label for="title">Title</label>
          <input type="text" id="title" required />
        </div>
        <div>
          <label for="description">Description</label>
          <textarea id="description" rows="3" required></textarea>
        </div>
        <div>
          <label for="price">Price</label>
          <input type="number" id="price" step="0.01" min="0" required />
        </div>
        <div class="card-actions">
          <button type="submit" id="submit-btn">Add Product</button>
          <button type="button" id="cancel-edit" class="secondary" style="display:none;">Cancel</button>
        </div>
      </form>
    </div>

    <div class="section">
      <h2>My Listings</h2>
      <div id="grid" class="grid"></div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/my-products.js"></script>
</body>
</html>
